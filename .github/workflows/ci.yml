name: Continuous Integration

on:
  push:
    branches: [ main, develop, 'feature/*' ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: library_db
          MYSQL_ROOT_PASSWORD: password
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # ==========================================
      # 1. JAVA BACKEND TEST & BUILD
      # ==========================================
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run Backend Unit Tests
        run: |
          cd backend
          mvn clean test -Dspring.datasource.url=jdbc:mysql://localhost:3306/library_db -Dspring.datasource.username=root -Dspring.datasource.password=password

      - name: Package Backend JAR
        run: |
          cd backend
          mvn package -DskipTests

      # ==========================================
      # 2. FRONTEND BUILD
      # ==========================================
      - name: Set up Node.js 18
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies & Build
        run: |
          cd frontend
          npm install
          npm run build

      # ==========================================
      # 3. CONTAINER COMPOSE & API TESTS
      # ==========================================
      - name: Start services using Docker Compose
        run: |
          docker-compose up --build -d mysql backend
          
      - name: Wait for API to respond
        run: |
          echo "Waiting for backend service to report healthy..."
          for i in {1..30}; do
            if curl -s http://localhost:8080/actuator/health | grep '"status":"UP"'; then
              echo "Backend is ready!"
              break
            fi
            echo "Waiting..."
            sleep 3
          done

      - name: Execute API Integration Tests
        run: |
          chmod +x api-tests/test_api.sh
          ./api-tests/test_api.sh

      # ==========================================
      # 4. DOCKER BUILD VALIDATION
      # ==========================================
      - name: Build Frontend Docker Image
        run: |
          docker build -t library-frontend:latest ./frontend

      - name: Clean environment
        if: always()
        run: |
          docker-compose down -v
